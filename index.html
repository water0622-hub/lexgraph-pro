<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法網 LexGraph Pro | 法律考點解析引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .loader {
            border-top-color: transparent;
            -webkit-animation: spinner 1s linear infinite;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 列印專屬樣式 */
        @media print {
            /* 隱藏所有非列印容器的直系子元素 */
            body > *:not(#print-container) {
                display: none !important;
            }
            
            /* 覆蓋 Tailwind 的 hidden 類別，強制顯示列印區塊 */
            #print-container {
                display: block !important;
                visibility: visible !important;
                position: relative;
                width: 100%;
                padding: 0;
            }
            
            /* 強制列印背景顏色，以保留標注重點的色彩 */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col overflow-x-hidden custom-scrollbar relative">

    <!-- 訊息提示 (Toast) -->
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50 transition-all duration-300 opacity-0 -translate-y-10 pointer-events-none flex items-center gap-3 font-bold">
        <span id="toast-icon"></span>
        <span id="toast-msg"></span>
    </div>

    <!-- 列印專用容器 (預設隱藏) -->
    <div id="print-container" class="hidden"></div>

    <!-- Navbar -->
    <header class="bg-slate-900 text-white shadow-md py-4 px-6 flex justify-between items-center z-20 shrink-0">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-scale-balanced text-3xl text-emerald-400"></i>
            <h1 class="text-2xl font-bold tracking-wider">法網 <span class="text-slate-300 font-normal">LexGraph Pro</span></h1>
        </div>
        <div class="text-sm bg-slate-800 py-1.5 px-4 rounded-full text-slate-200 flex items-center gap-2 border border-slate-700">
            <i class="fa-solid fa-file-contract text-emerald-400"></i> 法律考點解析引擎
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full flex flex-col gap-8 py-6 md:py-10">
        
        <!-- 區塊 1：輸入事實或考題 -->
        <div class="w-full max-w-5xl mx-auto px-4 md:px-8">
            <section id="input-section" class="w-full bg-white border border-slate-200 shadow-sm rounded-2xl p-6 md:p-8">
                
                <!-- API Key 區塊 -->
                <div class="mb-6 p-4 bg-emerald-50 border border-emerald-200 rounded-xl">
                    <label for="api-key-input" class="block text-sm font-bold text-emerald-800 mb-2">
                        <i class="fa-solid fa-key"></i> 設定 Gemini API Key (單機版使用時必填；於平台預覽時可留空)
                    </label>
                    <div class="flex gap-2">
                        <input type="password" id="api-key-input" class="flex-1 px-3 py-2 border border-emerald-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="請填入您的 API Key (例如：AIzaSy...)">
                        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center whitespace-nowrap transition-colors">
                            取得免費金鑰
                        </a>
                    </div>
                </div>

                <h2 class="text-xl md:text-2xl font-bold mb-4 flex items-center gap-3 text-slate-800">
                    <i class="fa-solid fa-pen-nib text-emerald-600"></i> 輸入事實或考題
                </h2>
                <textarea id="legal-input" class="w-full min-h-[150px] p-4 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 focus:bg-white resize-none text-lg leading-relaxed custom-scrollbar transition-all" placeholder="請描述您的法律問題。例如：甲為農地所有權人，與好友乙通謀虛偽意思表示，將農地假贈與乙，實為買賣..."></textarea>
                
                <div class="mt-5 flex flex-col sm:flex-row gap-4">
                    <button id="btn-generate" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-xl transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-3 text-lg tracking-wide">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> 萃取考點並生成解析
                    </button>
                    <button id="btn-example" class="sm:w-auto bg-slate-100 hover:bg-slate-200 text-slate-700 py-3.5 px-6 rounded-xl transition-colors border border-slate-200 flex items-center justify-center gap-2 font-medium text-lg" title="載入範例">
                        <i class="fa-solid fa-lightbulb text-amber-500"></i> 載入範例
                    </button>
                </div>

                <!-- Error Message -->
                <div id="status-container" class="hidden mt-4 p-4 bg-red-50 text-red-600 border border-red-200 rounded-lg text-base font-medium">
                    <i class="fa-solid fa-circle-exclamation mr-2"></i> <span id="status-text">發生錯誤</span>
                </div>
            </section>
        </div>

        <!-- 狀態區：等待與載入中 -->
        <div class="w-full max-w-5xl mx-auto px-4 md:px-8">
            <section id="status-section" class="flex flex-col items-center justify-center py-6">
                <!-- Empty State -->
                <div id="empty-state" class="flex flex-col items-center text-slate-400 transition-opacity duration-300">
                    <i class="fa-solid fa-map-location-dot text-7xl mb-6 text-slate-300 drop-shadow-sm"></i>
                    <h3 class="text-2xl font-bold text-slate-500">尚無分析結果</h3>
                    <p class="text-lg mt-3 text-slate-400 max-w-lg text-center leading-relaxed">請在上方輸入考題並點擊生成。系統將提供重點文字解析與結論。</p>
                </div>

                <!-- Loading State -->
                <div id="loading-indicator" class="hidden flex flex-col items-center bg-slate-50/90 backdrop-blur-sm p-10 rounded-2xl w-full">
                    <div class="loader border-4 border-slate-300 border-t-emerald-600 rounded-full w-16 h-16 mb-6"></div>
                    <h3 id="loading-text" class="text-2xl font-bold text-slate-800 tracking-wide">AI 正在深度拆解考點...</h3>
                    <p class="text-lg mt-3 text-slate-600 animate-pulse">正在生成文字解析中</p>
                </div>
            </section>
        </div>

        <!-- 結果展示區 (文字) -->
        <section id="result-section" class="hidden flex-col gap-8 pb-12 w-full max-w-5xl mx-auto px-4 md:px-8">
            
            <!-- 法律解析與結論 (文字區塊) -->
            <div class="w-full flex flex-col gap-6">
                
                <!-- 標題與操作按鈕列 -->
                <div class="w-full px-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-copy text-emerald-600 text-2xl"></i>
                        <span class="text-slate-700 font-bold text-2xl">爭點解析與涵攝</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="btn-copy" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg shadow-md font-bold flex items-center gap-2 transition-transform transform hover:scale-105 border border-blue-500">
                            <i class="fa-solid fa-clipboard"></i> 複製 (含格式)
                        </button>
                        <button id="btn-print" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-lg shadow-md font-bold flex items-center gap-2 transition-transform transform hover:scale-105 border border-slate-700">
                            <i class="fa-solid fa-print"></i> 列印報告
                        </button>
                    </div>
                </div>

                <!-- 關鍵法律爭點 (Copyable Text) -->
                <div class="border-l-[8px] border-emerald-500 bg-white p-6 md:p-10 rounded-r-2xl shadow-md border-y border-r border-slate-200 w-full relative text-left">
                    <h3 id="ui-issue-title" class="text-xl md:text-[28px] font-black text-emerald-900 mb-5 border-b-[3px] border-slate-100 pb-4 tracking-wide"></h3>
                    <div id="ui-issue-text" class="text-slate-800 font-medium leading-loose text-base md:text-[20px] whitespace-pre-wrap selection:bg-emerald-200"></div>
                </div>

                <!-- 最終結論 (Copyable Text) -->
                <div class="border-[4px] border-slate-800 rounded-2xl bg-white p-6 md:p-10 shadow-md w-full relative mt-2">
                    <div class="absolute -top-5 left-8 bg-slate-800 text-white px-6 py-1.5 rounded-full text-base font-bold tracking-widest shadow-md">最終結論</div>
                    <div id="ui-conclusion" class="text-lg md:text-[22px] font-black text-slate-900 leading-loose whitespace-pre-wrap mt-3 selection:bg-emerald-200 text-center"></div>
                </div>
            </div>
            
        </section>
    </main>

    <script>
        // DOM Elements
        const apiKeyInput = document.getElementById('api-key-input');
        const legalInput = document.getElementById('legal-input');
        const btnGenerate = document.getElementById('btn-generate');
        const btnExample = document.getElementById('btn-example');
        const btnCopy = document.getElementById('btn-copy');
        const btnPrint = document.getElementById('btn-print');
        
        const loadingIndicator = document.getElementById('loading-indicator');
        const loadingText = document.getElementById('loading-text');
        const emptyState = document.getElementById('empty-state');
        const statusSection = document.getElementById('status-section');
        const resultSection = document.getElementById('result-section');
        
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');

        // UI Text Elements
        const uiIssueTitle = document.getElementById('ui-issue-title');
        const uiIssueText = document.getElementById('ui-issue-text');
        const uiConclusion = document.getElementById('ui-conclusion');

        // Toast Function
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMsg.textContent = msg;
            toastIcon.innerHTML = isError ? '<i class="fa-solid fa-circle-exclamation text-red-400"></i>' : '<i class="fa-solid fa-circle-check text-green-400"></i>';
            
            toast.classList.remove('opacity-0', '-translate-y-10', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-10', 'pointer-events-none');
            }, 3000);
        }

        // Example Scenarios
        const examples = [
            "甲為農地所有權人，與好友乙通謀虛偽意思表示，將農地假贈與乙，實為買賣。同時，該農地原本即設定典權給丙。丙發現甲乙間的真買賣後，欲行使優先購買權。丙的請求是否有理由？",
            "甲出國16年後回國，發現其名下已登記之A地上，被乙無權占有並建有B屋（違章建築）。甲向乙請求拆屋還地，乙抗辯甲的返還請求權已罹於15年時效，拒絕返還。乙的抗辯是否有理由？",
            "甲向乙借款100萬元，並請丙擔任保證人。債務到期後甲無力清償，乙轉向丙請求，丙全數代為清償後，欲向甲請求返還。"
        ];
        let currentExampleIdx = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('lexgraph_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
            }
        });

        btnExample.addEventListener('click', () => {
            legalInput.value = examples[currentExampleIdx];
            currentExampleIdx = (currentExampleIdx + 1) % examples.length;
        });

        function showError(msg) {
            statusContainer.classList.remove('hidden');
            statusText.textContent = msg;
        }

        function hideError() {
            statusContainer.classList.add('hidden');
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        function formatHighlight(text) {
            if(!text) return "";
            // 將 【】 改為行內樣式，確保複製到外部軟體時保留紅字與粗體格式
            let formatted = text.replace(/【(.*?)】/g, '<span style="color: #dc2626; font-weight: bold; font-size: 1.15em;">【$1】</span>');
            // 將 Markdown 的 **粗體** 也轉為行內樣式
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong style="font-weight: bold;">$1</strong>');
            return formatted;
        }

        async function fetchAnalysis(text, apiKey) {
            const isCanvasInternal = !apiKey;
            const textModel = isCanvasInternal ? "gemini-2.5-flash-preview-09-2025" : "gemini-2.5-flash";
            const textApiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${textModel}:generateContent?key=${apiKey}`;
            
            const systemPrompt = `你是一位專業的台灣民法學者。請分析使用者的法律事實。
請輸出 JSON 格式，包含以下欄位：
- issue_title: 爭點標題 (如「【關鍵爭點：丙得否主張權利？】」)
- issue_analysis: 爭點涵攝與詳細分析，重要考點字眼請用【】包裝。
- conclusion: 最終結論，結論字眼用【】包裝。`;

            const textPayload = {
                contents: [{ parts: [{ text: text }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            issue_title: { type: "STRING" },
                            issue_analysis: { type: "STRING" },
                            conclusion: { type: "STRING" }
                        },
                        required: ["issue_title", "issue_analysis", "conclusion"]
                    }
                }
            };

            let textData = null;
            const maxRetries = 3;
            const delays = [1000, 2000, 4000];

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(textApiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(textPayload)
                    });
                    if (!response.ok) {
                        const errDetails = await response.text();
                        console.error("Text API Error:", errDetails);
                        throw new Error(`文字 API 錯誤狀態碼: ${response.status}`);
                    }
                    const result = await response.json();
                    if (!result.candidates || result.candidates.length === 0) throw new Error("無效的 API 回應");
                    textData = JSON.parse(result.candidates[0].content.parts[0].text);
                    break;
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await delay(delays[i]);
                }
            }

            if (!textData) throw new Error("無法取得文字解析。");

            return textData;
        }

        // ==========================================
        // 核心功能：呼叫 AI 分析
        // ==========================================
        btnGenerate.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                localStorage.setItem('lexgraph_api_key', apiKey);
            }

            const text = legalInput.value.trim();
            if (!text) {
                showError("請先輸入法律事實或考題！");
                return;
            }

            hideError();
            btnGenerate.disabled = true;
            btnGenerate.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 處理中...`;
            
            resultSection.classList.add('hidden');
            resultSection.classList.remove('flex');
            emptyState.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            statusSection.classList.remove('hidden');

            try {
                loadingText.textContent = "AI 正在分析案情並萃取考點...";
                
                const result = await fetchAnalysis(text, apiKey);

                uiIssueTitle.innerHTML = result.issue_title;
                uiIssueText.innerHTML = formatHighlight(result.issue_analysis);
                uiConclusion.innerHTML = formatHighlight(result.conclusion);
                
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
                statusSection.classList.add('hidden');
                
                resultSection.classList.remove('hidden');
                resultSection.classList.add('flex');

            } catch (err) {
                console.error("執行失敗：", err);
                showError("生成失敗！若使用單機版請確認 API Key 是否填寫且有效。");
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } finally {
                btnGenerate.disabled = false;
                btnGenerate.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> 萃取考點並生成解析`;
            }
        });

        // ==========================================
        // 核心功能：複製含格式文字 (Rich Text Copy)
        // ==========================================
        btnCopy.addEventListener('click', () => {
            // 建立一個臨時容器來構造帶有 Inline-style 的 HTML
            const tempDiv = document.createElement('div');
            
            // 將換行符號 \n 轉換為 <br> 以相容 Word / Notion，並保留原本轉換好的行內樣式 span
            const issueTextHtml = uiIssueText.innerHTML.replace(/\n/g, '<br>');
            const conclusionHtml = uiConclusion.innerHTML.replace(/\n/g, '<br>');
            
            // 將畫面上套用的樣式轉換為行內樣式，確保貼上時維持精美排版
            tempDiv.innerHTML = `
                <div style="font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; line-height: 1.8; color: #1e293b; max-width: 800px;">
                    <h3 style="font-size: 20px; font-weight: bold; color: #064e3b; margin-bottom: 12px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;">
                        ${uiIssueTitle.innerText}
                    </h3>
                    <div style="font-size: 16px; margin-bottom: 24px;">
                        ${issueTextHtml}
                    </div>
                    
                    <h3 style="font-size: 20px; font-weight: bold; color: #0f172a; margin-bottom: 12px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;">
                        最終結論
                    </h3>
                    <div style="font-size: 16px; font-weight: bold; background-color: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1;">
                        ${conclusionHtml}
                    </div>
                </div>
            `;
            
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            document.body.appendChild(tempDiv);
            
            // 選取該臨時容器的內容
            const range = document.createRange();
            range.selectNodeContents(tempDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                // 執行複製
                document.execCommand('copy');
                showToast('已成功複製解析與結論（包含文字格式）');
            } catch (err) {
                console.error('複製失敗', err);
                showToast('複製失敗，請嘗試手動選取複製', true);
            }
            
            // 清理
            selection.removeAllRanges();
            document.body.removeChild(tempDiv);
        });

        // ==========================================
        // 核心功能：列印考題與解析
        // ==========================================
        btnPrint.addEventListener('click', () => {
            const printContainer = document.getElementById('print-container');
            
            // 構造專門用於列印的純淨排版
            printContainer.innerHTML = `
                <div style="font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: #000;">
                    <h1 style="font-size: 28px; text-align: center; border-bottom: 3px solid #0f172a; padding-bottom: 10px; margin-bottom: 20px; font-weight: bold;">
                        法律考點解析報告
                    </h1>
                    
                    <h2 style="font-size: 20px; color: #047857; margin-bottom: 10px; font-weight: bold;">■ 考題事實</h2>
                    <div style="font-size: 16px; line-height: 1.8; margin-bottom: 30px; white-space: pre-wrap; background-color: #f1f5f9; padding: 15px; border-left: 5px solid #059669;">${legalInput.value}</div>
                    
                    <h2 style="font-size: 20px; color: #047857; margin-bottom: 10px; font-weight: bold;">■ ${uiIssueTitle.innerText}</h2>
                    <div style="font-size: 16px; line-height: 1.8; margin-bottom: 30px; white-space: pre-wrap;">${uiIssueText.innerHTML}</div>
                    
                    <h2 style="font-size: 20px; color: #0f172a; margin-bottom: 10px; font-weight: bold;">■ 最終結論</h2>
                    <div style="font-size: 18px; line-height: 1.8; margin-bottom: 30px; white-space: pre-wrap; border: 2px solid #1e293b; padding: 15px; border-radius: 8px; font-weight: bold;">${uiConclusion.innerHTML}</div>
                </div>
            `;
            
            // 給予瀏覽器極短暫的時間來更新 DOM，隨後呼叫系統列印視窗
            setTimeout(() => {
                window.print();
            }, 100);
        });
    </script>
</body>
</html>
